---
# Git repository configuration
kernel_git_repo: "https://github.com/torvalds/linux.git"
kernel_git_dir: "/usr/src/linux-git"
# Alias: same as kernel_git_dir (keeps older playbooks / task names aligned)
kernel_git_clone_path: "{{ kernel_git_dir }}"
kernel_git_branch: "master"  # or a specific tag/commit
kernel_git_update: true
# kernel_git_depth: 1  # optional shallow clone

# In-tree or checked-out location used as build tree from git
kernel_build_dir: "{{ kernel_git_dir }}"

# Bug report (optional) — set bug_url or kernel_bug_config_url to use fetch_bug_config
# bug_url: "https://syzkaller.appspot.com/bug?extid=..."
# kernel_bug_config_url: "https://syzkaller.appspot.com/text?tag=KernelConfig&x=..."

# Build options
clean_before_build: true
install_kernel: false
num_cores: "{{ ansible_processor_vcpus | default(2) }}"
reboot_after_build: false
