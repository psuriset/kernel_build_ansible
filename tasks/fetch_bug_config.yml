---
# NOTE: Cannot automatically extract config URL from bug URL because the
# kernel config hash is not derivable from the bug extid. Users must:
# 1. Visit the bug URL in a browser
# 2. Find the "Kernel config" link
# 3. Copy that URL to kernel_bug_config_url variable
#
# This task now only handles direct config URLs via kernel_bug_config_url

- name: Fail if bug_url is provided without config_url
  ansible.builtin.fail:
    msg: |
      Cannot automatically extract kernel config from bug URL.
      Please visit {{ bug_url }} and copy the "Kernel config" link.
      Then set: kernel_bug_config_url: "<the config URL>"
  when:
    - bug_url is defined
    - kernel_bug_config_url is not defined

- name: Use direct config URL if provided
  ansible.builtin.set_fact:
    config_url: "{{ kernel_bug_config_url }}"
  when: kernel_bug_config_url is defined

- name: Fail if no config URL available
  ansible.builtin.fail:
    msg: "Either bug_url or kernel_bug_config_url must be provided"
  when: config_url is not defined

- name: Display config URL
  ansible.builtin.debug:
    msg: "Downloading kernel config from: {{ config_url }}"

- name: Download kernel config from bug report
  ansible.builtin.get_url:
    url: "{{ config_url }}"
    dest: "{{ kernel_build_dir }}/.config"
    mode: '0644'
    force: true
  become: true
  register: config_download

- name: Verify config file was downloaded
  ansible.builtin.stat:
    path: "{{ kernel_build_dir }}/.config"
  register: config_file_stat

- name: Fail if config file is empty
  ansible.builtin.fail:
    msg: "Downloaded config file is empty or invalid"
  when: config_file_stat.stat.size == 0

- name: Run olddefconfig to update config
  ansible.builtin.command: make olddefconfig
  args:
    chdir: "{{ kernel_build_dir }}"
  become: true
  when: config_download.changed
