---
# Build from a git tree at {{ kernel_build_dir }} (usually same as {{ kernel_git_dir }}).
- name: Install required packages for kernel build
  ansible.builtin.import_tasks: tasks/install_kernel_build_packages.yml

- name: Create or verify kernel build directory exists
  ansible.builtin.file:
    path: "{{ kernel_build_dir }}"
    state: directory
    mode: '0755'
  become: true

- name: Clean previous build artifacts
  ansible.builtin.command: make mrproper
  args:
    chdir: "{{ kernel_build_dir }}"
  become: true
  when: clean_before_build | default(true)

- name: Fetch kernel config from bug report
  ansible.builtin.import_tasks: tasks/fetch_bug_config.yml
  when: (bug_url is defined) or (kernel_bug_config_url is defined)

- name: Generate default config if no bug config provided
  ansible.builtin.command: make defconfig
  args:
    chdir: "{{ kernel_build_dir }}"
    creates: "{{ kernel_build_dir }}/.config"
  become: true
  when: (bug_url is not defined) and (kernel_bug_config_url is not defined)

- name: Display build configuration
  ansible.builtin.debug:
    msg:
      - "Building kernel from: {{ kernel_build_dir }}"
      - "Using {{ num_cores }} CPU cores"
      - "Config source: {{ 'Bug report' if (bug_url is defined or kernel_bug_config_url is defined) else 'defconfig' }}"

- name: Build kernel and modules
  ansible.builtin.shell: |
    set -e
    make -j{{ num_cores }}
    touch .build-complete
  args:
    chdir: "{{ kernel_build_dir }}"
    creates: "{{ kernel_build_dir }}/.build-complete"
  become: true
  register: kernel_build
  async: 7200
  poll: 30

- name: Get built kernel release
  ansible.builtin.command: make -s kernelrelease
  args:
    chdir: "{{ kernel_build_dir }}"
  register: kernel_release
  changed_when: false

- name: Display built kernel version
  ansible.builtin.debug:
    msg: "Built kernel version: {{ kernel_release.stdout }}"

- name: Install kernel modules
  ansible.builtin.command: make modules_install
  args:
    chdir: "{{ kernel_build_dir }}"
  become: true
  when: install_kernel | default(false)

- name: Install kernel
  ansible.builtin.command: make install
  args:
    chdir: "{{ kernel_build_dir }}"
  become: true
  when: install_kernel | default(false)

- name: Detect GRUB config path (BIOS vs UEFI)
  ansible.builtin.stat:
    path: "/boot/efi/EFI/redhat/grub.cfg"
  register: grub_efi
  when: install_kernel | default(false)

- name: Set effective GRUB config path
  ansible.builtin.set_fact:
    effective_grub_cfg: "{{ '/boot/efi/EFI/redhat/grub.cfg' if grub_efi.stat.exists else grub_cfg_path }}"
  when: install_kernel | default(false)

- name: Create initramfs for the new kernel
  ansible.builtin.command: "dracut --force /boot/initramfs-{{ kernel_release.stdout }}.img {{ kernel_release.stdout }}"
  args:
    creates: "/boot/initramfs-{{ kernel_release.stdout }}.img"
  become: true
  when:
    - install_kernel | default(false)
    - ansible_os_family == "RedHat"

- name: Update GRUB configuration
  ansible.builtin.command: "grub2-mkconfig -o {{ effective_grub_cfg }}"
  become: true
  when:
    - install_kernel | default(false)
    - ansible_os_family == "RedHat"

- name: Optional reboot to new kernel
  ansible.builtin.reboot:
    msg: "Rebooting to use newly built kernel"
    pre_reboot_delay: 5
    post_reboot_delay: "{{ post_reboot_delay | default(20) }}"
    reboot_timeout: "{{ reboot_timeout | default(600) }}"
  when:
    - install_kernel | default(false)
    - reboot_after_build | default(false)
